<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a2a4a" />
  <meta name="description" content="App gestione ristorante - Sabrina" />
  <title>Ristorante Sabrina</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOGIN -->
  <div id="screen-login" class="screen active">
    <div class="login-box">
      <div class="logo">
        <div class="logo-icon">&#127869;</div>
        <h1>Ristorante Sabrina</h1>
        <p class="logo-sub">Gestione Interna</p>
      </div>
      <div class="login-form">
        <label for="sel-nome">CHI SEI?</label>
        <select id="sel-nome">
          <option value="">-- Seleziona --</option>
          <option value="Giancarlo">Giancarlo</option>
          <option value="Sabrina">Sabrina</option>
          <option value="Cecilia">Cecilia</option>
          <option value="Marco">Marco</option>
          <option value="Elena">Elena</option>
          <option value="Luca">Luca</option>
        </select>
        <label for="inp-pin">PIN PERSONALE</label>
        <input id="inp-pin" type="password" inputmode="numeric" maxlength="4" placeholder="PIN a 4 cifre" />
        <p id="pin-errore" class="pin-errore hidden">PIN errato. Riprova.</p>
        <p id="pin-occupato" class="pin-errore hidden">Utente gia connesso su un altro dispositivo.</p>
        <button id="btn-login" class="btn-primary">Accedi</button>
      </div>
    </div>
  </div>

  <!-- APP -->
  <div id="screen-app" class="screen">
    <header class="app-header">
      <span class="app-title">&#127869; Ristorante Sabrina</span>
      <span id="header-utente" class="header-utente"></span>
      <button id="btn-logout" class="btn-logout">Esci</button>
    </header>

    <main class="app-main">

      <!-- BACHECA -->
      <div id="sec-bacheca" class="section active">
        <div class="section-header">
          <h2>Bacheca</h2>
          <button id="btn-new-post" class="btn-secondary">+ Messaggio</button>
        </div>
        <div id="form-post" class="card hidden">
          <textarea id="txt-post" placeholder="Scrivi un messaggio per la bacheca..." rows="3"></textarea>
          <div class="form-actions">
            <button id="btn-cancel-post" class="btn-ghost">Annulla</button>
            <button id="btn-save-post" class="btn-primary">Pubblica</button>
          </div>
        </div>
        <div id="bacheca-list" class="list-container"></div>
      </div>

      <!-- ORDINI -->
      <div id="sec-ordini" class="section">
        <div class="section-header">
          <h2>Ordini</h2>
          <button id="btn-new-ordine" class="btn-secondary">+ Ordine</button>
        </div>
        <div id="form-ordine" class="card hidden">
          <input id="txt-tavolo" type="number" placeholder="Numero tavolo" min="1" max="99" />
          <textarea id="txt-ordine" placeholder="Descrivi l'ordine..." rows="3"></textarea>
          <div class="form-actions">
            <button id="btn-cancel-ordine" class="btn-ghost">Annulla</button>
            <button id="btn-save-ordine" class="btn-primary">Salva</button>
          </div>
        </div>
        <div id="ordini-list" class="list-container"></div>
      </div>

      <!-- TURNI -->
      <div id="sec-turni" class="section">
        <div class="section-header">
          <h2>Turni</h2>
          <button id="btn-new-turno" class="btn-secondary">+ Turno</button>
        </div>
        <div id="form-turno" class="card hidden">
          <label>Data</label>
          <input id="txt-data" type="date" />
          <label>Turno</label>
          <select id="sel-turno-tipo">
            <option value="colazione">&#9749; Colazione</option>
            <option value="pranzo">&#127774; Pranzo</option>
            <option value="cena">&#127769; Cena</option>
          </select>
          <label>Persona</label>
          <select id="sel-turno-utente">
            <option value="Giancarlo">Giancarlo</option>
            <option value="Sabrina">Sabrina</option>
            <option value="Cecilia">Cecilia</option>
            <option value="Marco">Marco</option>
            <option value="Elena">Elena</option>
            <option value="Luca">Luca</option>
          </select>
          <div class="form-actions">
            <button id="btn-cancel-turno" class="btn-ghost">Annulla</button>
            <button id="btn-save-turno" class="btn-primary">Salva</button>
          </div>
        </div>
        <div id="turni-list" class="list-container"></div>
      </div>

      <!-- ATTIVITA -->
      <div id="sec-attivita" class="section">
        <div class="section-header">
          <h2>Attivita</h2>
          <button id="btn-new-task" class="btn-secondary">+ Attivita</button>
        </div>
        <div id="form-task" class="card hidden">
          <textarea id="txt-task" placeholder="Descrivi l'attivita..." rows="2"></textarea>
          <label>Priorita</label>
          <select id="sel-task-priorita">
            <option value="normale">Normale</option>
            <option value="alta">Alta</option>
            <option value="urgente">Urgente</option>
          </select>
          <div class="form-actions">
            <button id="btn-cancel-task" class="btn-ghost">Annulla</button>
            <button id="btn-save-task" class="btn-primary">Salva</button>
          </div>
        </div>
        <div id="attivita-list" class="list-container"></div>
      </div>

    </main>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-target="bacheca">
        <span class="nav-icon">&#128203;</span>
        <span>Bacheca</span>
      </button>
      <button class="nav-btn" data-target="ordini">
        <span class="nav-icon">&#127860;</span>
        <span>Ordini</span>
      </button>
      <button class="nav-btn" data-target="turni">
        <span class="nav-icon">&#128197;</span>
        <span>Turni</span>
      </button>
      <button class="nav-btn" data-target="attivita">
        <span class="nav-icon">&#9989;</span>
        <span>Attivita</span>
      </button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
