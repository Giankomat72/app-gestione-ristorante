<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a2a4a" />
  <meta name="description" content="App gestione ristorante - Sabrina" />
  <title>Ristorante Sabrina</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SPLASH / LOGIN -->
  <div id="screen-login" class="screen active">
    <div class="login-box">
      <div class="logo">
        <div class="logo-icon">&#127869;</div>
        <h1>Ristorante Sabrina</h1>
        <p class="logo-sub">Gestione Interna</p>
      </div>
      <div class="login-form">
        <label for="sel-nome">Chi sei?</label>
        <select id="sel-nome">
          <option value="">-- Seleziona --</option>
          <option value="Giancarlo">Giancarlo</option>
          <option value="Sabrina">Sabrina</option>
          <option value="Marco">Marco</option>
          <option value="Elena">Elena</option>
          <option value="Luca">Luca</option>
        </select>
        <label for="sel-ruolo">Ruolo</label>
        <select id="sel-ruolo">
          <option value="">-- Seleziona --</option>
          <option value="admin">Admin</option>
          <option value="sala">Sala</option>
          <option value="cucina">Cucina</option>
        </select>
        <button id="btn-login" class="btn-primary">Accedi</button>
      </div>
    </div>
  </div>

  <!-- APP PRINCIPALE -->
  <div id="screen-app" class="screen">

    <!-- HEADER -->
    <header class="app-header">
      <div class="header-left">
        <span class="header-logo">&#127869;</span>
        <span class="header-title">Ristorante Sabrina</span>
      </div>
      <div class="header-right">
        <span id="header-utente" class="header-user"></span>
        <button id="btn-logout" class="btn-logout" title="Esci">&#x2715;</button>
      </div>
    </header>

    <!-- CONTENUTO SEZIONI -->
    <main class="app-main">

      <!-- BACHECA -->
      <section id="sec-bacheca" class="section active">
        <div class="section-header">
          <h2>&#128203; Bacheca</h2>
          <button class="btn-add" id="btn-new-post">+ Nuovo</button>
        </div>
        <div id="bacheca-list" class="card-list">
          <div class="card">
            <div class="card-meta">Giancarlo &bull; oggi</div>
            <div class="card-body">Benvenuti nell'app di gestione. Iniziate ad usarla!</div>
          </div>
        </div>
        <div id="form-post" class="form-panel hidden">
          <textarea id="txt-post" placeholder="Scrivi un messaggio..."></textarea>
          <div class="form-actions">
            <button class="btn-secondary" id="btn-cancel-post">Annulla</button>
            <button class="btn-primary" id="btn-save-post">Pubblica</button>
          </div>
        </div>
      </section>

      <!-- ORDINI -->
      <section id="sec-ordini" class="section">
        <div class="section-header">
          <h2>&#127858; Ordini</h2>
          <button class="btn-add" id="btn-new-ordine">+ Nuovo</button>
        </div>
        <div id="ordini-list" class="card-list">
          <div class="empty-state">Nessun ordine attivo</div>
        </div>
        <div id="form-ordine" class="form-panel hidden">
          <input type="number" id="txt-tavolo" placeholder="Numero tavolo" min="1" max="30" />
          <textarea id="txt-ordine" placeholder="Descrivi l'ordine..."></textarea>
          <div class="form-actions">
            <button class="btn-secondary" id="btn-cancel-ordine">Annulla</button>
            <button class="btn-primary" id="btn-save-ordine">Invia</button>
          </div>
        </div>
      </section>

      <!-- TURNI -->
      <section id="sec-turni" class="section">
        <div class="section-header">
          <h2>&#128197; Turni</h2>
          <button class="btn-add" id="btn-new-turno">+ Aggiungi</button>
        </div>
        <div id="turni-list" class="card-list">
          <div class="empty-state">Nessun turno registrato</div>
        </div>
        <div id="form-turno" class="form-panel hidden">
          <input type="date" id="txt-data" />
          <select id="sel-turno-tipo">
            <option value="pranzo">Pranzo</option>
            <option value="cena">Cena</option>
          </select>
          <select id="sel-turno-utente">
            <option value="Giancarlo">Giancarlo</option>
            <option value="Sabrina">Sabrina</option>
            <option value="Marco">Marco</option>
            <option value="Elena">Elena</option>
            <option value="Luca">Luca</option>
          </select>
          <div class="form-actions">
            <button class="btn-secondary" id="btn-cancel-turno">Annulla</button>
            <button class="btn-primary" id="btn-save-turno">Salva</button>
          </div>
        </div>
      </section>

      <!-- ATTIVITA -->
      <section id="sec-attivita" class="section">
        <div class="section-header">
          <h2>&#9989; Attivit&agrave;</h2>
          <button class="btn-add" id="btn-new-task">+ Nuova</button>
        </div>
        <div id="attivita-list" class="card-list">
          <div class="empty-state">Nessuna attivit&agrave; in corso</div>
        </div>
        <div id="form-task" class="form-panel hidden">
          <input type="text" id="txt-task" placeholder="Descrivi l'attivita..." />
          <select id="sel-task-priorita">
            <option value="normale">Normale</option>
            <option value="urgente">Urgente</option>
          </select>
          <div class="form-actions">
            <button class="btn-secondary" id="btn-cancel-task">Annulla</button>
            <button class="btn-primary" id="btn-save-task">Aggiungi</button>
          </div>
        </div>
      </section>

    </main>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-target="bacheca">
        <span class="nav-icon">&#128203;</span>
        <span class="nav-label">Bacheca</span>
      </button>
      <button class="nav-btn" data-target="ordini">
        <span class="nav-icon">&#127858;</span>
        <span class="nav-label">Ordini</span>
      </button>
      <button class="nav-btn" data-target="turni">
        <span class="nav-icon">&#128197;</span>
        <span class="nav-label">Turni</span>
      </button>
      <button class="nav-btn" data-target="attivita">
        <span class="nav-icon">&#9989;</span>
        <span class="nav-label">Attivita</span>
      </button>
    </nav>

  </div>

  <script src="app.js"></script>
</body>
</html>
